name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"
      - name: Run Swift tests
        run: |
          mkdir -p bin
          swiftc -parse-as-library \
            Sources/KeyguardCore/Logic.swift \
            Tests/KeyguardCoreTests/LogicTests.swift \
            -o bin/test-logic
          bin/test-logic

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: python -m pytest Tests/test_keyguard_server.py -v
